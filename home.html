<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Attack Risk Prediction</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background: #fff;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 400px;
        text-align: center;
      }
      h1 {
        color: #333;
        margin-bottom: 1.5rem;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .option {
        background: #007bff;
        color: #fff;
        padding: 0.75rem;
        border-radius: 5px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        transition: background 0.3s ease;
      }
      .option:hover {
        background: #0056b3;
      }
      .form-container {
        display: none;
        margin-top: 1.5rem;
      }
      .form-container.active {
        display: block;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #555;
        text-align: left;
      }
      input[type="file"],
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 1rem;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      button {
        background: #28a745;
        color: #fff;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      button:hover {
        background: #218838;
      }
      .back-button {
        background: #6c757d;
        margin-top: 1rem;
      }
      .back-button:hover {
        background: #5a6268;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Heart Attack Risk Prediction</h1>
      <div class="options">
        <div class="option" id="choose-file-option">Choose File</div>
        <div class="option" id="manual-entry-option">
          Manually Enter Details
        </div>
      </div>

      <!-- File Upload Form -->
      <div class="form-container" id="file-upload-form">
        <form
          action="{% url 'predict_risk' %}"
          method="post"
          enctype="multipart/form-data"
        >
          {% csrf_token %}
          <label for="file">Upload Patient Data (CSV):</label>
          <input type="file" name="file" id="file" required />
          <button type="submit">Predict Risk</button>
        </form>
        <button class="back-button" onclick="showOptions()">Back</button>
      </div>

      <!-- Manual Entry Form -->
      <!-- Manual Entry Form -->
      <div class="form-container" id="manual-entry-form">
        <form action="{% url 'predict_risk' %}" method="post">
          {% csrf_token %}
          <label for="age">Age:</label>
          <input type="number" name="age" id="age" required />

          <label for="bp">Blood Pressure (BP):</label>
          <input type="number" name="bp" id="bp" required />

          <label for="sg">Specific Gravity (SG):</label>
          <input type="number" step="0.001" name="sg" id="sg" required />

          <label for="al">Albumin (AL):</label>
          <input type="number" name="al" id="al" required />

          <label for="su">Sugar (SU):</label>
          <input type="number" name="su" id="su" required />

          <label for="hemo">Hemoglobin (Hemo):</label>
          <input type="number" step="0.1" name="hemo" id="hemo" required />

          <label for="pcv">Packed Cell Volume (PCV):</label>
          <input type="number" name="pcv" id="pcv" required />

          <button type="submit">Predict Risk</button>
        </form>
        <button class="back-button" onclick="showOptions()">Back</button>
      </div>
    </div>

    <script>
      // Show file upload form
      document
        .getElementById("choose-file-option")
        .addEventListener("click", function () {
          document.getElementById("file-upload-form").classList.add("active");
          document
            .getElementById("manual-entry-form")
            .classList.remove("active");
        });

      // Show manual entry form
      document
        .getElementById("manual-entry-option")
        .addEventListener("click", function () {
          document.getElementById("manual-entry-form").classList.add("active");
          document
            .getElementById("file-upload-form")
            .classList.remove("active");
        });

      // Show options (back button functionality)
      function showOptions() {
        document.getElementById("file-upload-form").classList.remove("active");
        document.getElementById("manual-entry-form").classList.remove("active");
      }
    </script>
  </body>
</html>
